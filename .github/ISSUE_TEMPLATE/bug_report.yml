name: Bug report
description: Report a defect with clear reproduction steps and expected behavior.
title: "bug(scope): "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the bug clearly and concisely.
      placeholder: The API returns a 500 when...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the exact steps needed to reproduce the issue.
      placeholder: |
        1. Run ...
        2. Open ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: Describe what should have happened instead.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Describe what actually happened, including error messages if present.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - web
        - api
        - worker
        - infra
        - docs
        - repo
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add screenshots, logs, links, or related issues if relevant.
