name: Feature request
description: Propose a new feature or enhancement with clear user value and scope.
title: "feat(scope): "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What user or system problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest practical solution.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope and constraints
      description: List explicit constraints, non-goals, or dependencies.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Primary area
      options:
        - web
        - api
        - worker
        - infra
        - docs
        - repo
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Define what must be true for this issue to be considered complete.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
