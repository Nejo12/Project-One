name: Deploy Web

on:
  workflow_dispatch:
    inputs:
      target:
        description: Deployment target
        required: true
        type: choice
        options:
          - preview
          - production
        default: preview

permissions:
  contents: read

concurrency:
  group: deploy-web-${{ github.event.inputs.target }}
  cancel-in-progress: true

env:
  NODE_VERSION: 22

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Validate required Vercel secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID_WEB: ${{ secrets.VERCEL_PROJECT_ID_WEB }}
        run: |
          missing=""

          for secret_name in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID_WEB; do
            eval "secret_value=\${${secret_name}}"
            if [ -z "${secret_value}" ]; then
              missing="${missing} ${secret_name}"
            fi
          done

          if [ -n "${missing}" ]; then
            echo "Missing required secrets:${missing}" >&2
            exit 1
          fi

      - name: Add workflow summary
        run: |
          {
            echo "## Web Deployment"
            echo
            echo "- target: ${{ github.event.inputs.target }}"
            echo "- trigger: manual fallback workflow"
            echo "- provider of record: Vercel native Git deployment"
          } >> "${GITHUB_STEP_SUMMARY}"

  deploy-preview:
    name: deploy-preview
    if: ${{ github.event.inputs.target == 'preview' }}
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: preview

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel preview environment
        working-directory: apps/web
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEB }}
        run: vercel pull --yes --environment=preview --token="${VERCEL_TOKEN}"

      - name: Build preview artifact
        working-directory: apps/web
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build --token="${VERCEL_TOKEN}"

      - name: Deploy preview build
        id: deploy
        working-directory: apps/web
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          deployment_url="$(vercel deploy --prebuilt --token="${VERCEL_TOKEN}")"
          echo "deployment_url=${deployment_url}" >> "${GITHUB_OUTPUT}"

      - name: Add workflow summary
        run: |
          {
            echo "## Web Deployment"
            echo
            echo "- target: preview"
            echo "- url: ${{ steps.deploy.outputs.deployment_url }}"
          } >> "${GITHUB_STEP_SUMMARY}"

  deploy-production:
    name: deploy-production
    if: ${{ github.event.inputs.target == 'production' }}
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel production environment
        working-directory: apps/web
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEB }}
        run: vercel pull --yes --environment=production --token="${VERCEL_TOKEN}"

      - name: Build production artifact
        working-directory: apps/web
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build --prod --token="${VERCEL_TOKEN}"

      - name: Deploy production build
        id: deploy
        working-directory: apps/web
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          deployment_url="$(vercel deploy --prebuilt --prod --token="${VERCEL_TOKEN}")"
          echo "deployment_url=${deployment_url}" >> "${GITHUB_OUTPUT}"

      - name: Add workflow summary
        run: |
          {
            echo "## Web Deployment"
            echo
            echo "- target: production"
            echo "- url: ${{ steps.deploy.outputs.deployment_url }}"
          } >> "${GITHUB_STEP_SUMMARY}"
