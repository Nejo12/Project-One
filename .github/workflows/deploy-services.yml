name: Deploy Services

on:
  workflow_dispatch:
    inputs:
      target:
        description: Deployment target
        required: true
        type: choice
        options:
          - staging
          - production
        default: staging
      service:
        description: Service selection
        required: true
        type: choice
        options:
          - all
          - api
          - worker
        default: all

permissions:
  contents: read

concurrency:
  group: deploy-services-${{ github.event.inputs.target }}-${{ github.event.inputs.service }}
  cancel-in-progress: false

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Validate deploy-hook availability
        env:
          TARGET: ${{ github.event.inputs.target }}
          SERVICE: ${{ github.event.inputs.service }}
          RAILWAY_DEPLOY_HOOK_URL_API_STAGING: ${{ secrets.RAILWAY_DEPLOY_HOOK_URL_API_STAGING }}
          RAILWAY_DEPLOY_HOOK_URL_WORKER_STAGING: ${{ secrets.RAILWAY_DEPLOY_HOOK_URL_WORKER_STAGING }}
          RAILWAY_DEPLOY_HOOK_URL_API_PRODUCTION: ${{ secrets.RAILWAY_DEPLOY_HOOK_URL_API_PRODUCTION }}
          RAILWAY_DEPLOY_HOOK_URL_WORKER_PRODUCTION: ${{ secrets.RAILWAY_DEPLOY_HOOK_URL_WORKER_PRODUCTION }}
        run: |
          missing=""

          require_secret() {
            secret_name="$1"
            eval "secret_value=\${${secret_name}}"
            if [ -z "${secret_value}" ]; then
              missing="${missing} ${secret_name}"
            fi
          }

          if [ "${TARGET}" = "staging" ]; then
            if [ "${SERVICE}" = "all" ] || [ "${SERVICE}" = "api" ]; then
              require_secret RAILWAY_DEPLOY_HOOK_URL_API_STAGING
            fi

            if [ "${SERVICE}" = "all" ] || [ "${SERVICE}" = "worker" ]; then
              require_secret RAILWAY_DEPLOY_HOOK_URL_WORKER_STAGING
            fi
          fi

          if [ "${TARGET}" = "production" ]; then
            if [ "${SERVICE}" = "all" ] || [ "${SERVICE}" = "api" ]; then
              require_secret RAILWAY_DEPLOY_HOOK_URL_API_PRODUCTION
            fi

            if [ "${SERVICE}" = "all" ] || [ "${SERVICE}" = "worker" ]; then
              require_secret RAILWAY_DEPLOY_HOOK_URL_WORKER_PRODUCTION
            fi
          fi

          if [ -n "${missing}" ]; then
            echo "Missing required Railway deploy-hook secrets:${missing}" >&2
            exit 1
          fi

      - name: Add workflow summary
        run: |
          {
            echo "## Services Deployment"
            echo
            echo "- target: ${{ github.event.inputs.target }}"
            echo "- service: ${{ github.event.inputs.service }}"
            echo "- trigger: manual fallback workflow"
            echo "- provider of record: Railway native Git deployment"
          } >> "${GITHUB_STEP_SUMMARY}"

  deploy-api-staging:
    name: deploy-api-staging
    if: ${{ github.event.inputs.target == 'staging' && (github.event.inputs.service == 'all' || github.event.inputs.service == 'api') }}
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: staging

    steps:
      - name: Trigger Railway API staging deployment
        env:
          RAILWAY_DEPLOY_HOOK_URL_API_STAGING: ${{ secrets.RAILWAY_DEPLOY_HOOK_URL_API_STAGING }}
        run: curl --fail --silent --show-error --location --request POST "${RAILWAY_DEPLOY_HOOK_URL_API_STAGING}"

  deploy-worker-staging:
    name: deploy-worker-staging
    if: ${{ github.event.inputs.target == 'staging' && (github.event.inputs.service == 'all' || github.event.inputs.service == 'worker') }}
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: staging

    steps:
      - name: Trigger Railway worker staging deployment
        env:
          RAILWAY_DEPLOY_HOOK_URL_WORKER_STAGING: ${{ secrets.RAILWAY_DEPLOY_HOOK_URL_WORKER_STAGING }}
        run: curl --fail --silent --show-error --location --request POST "${RAILWAY_DEPLOY_HOOK_URL_WORKER_STAGING}"

  deploy-api-production:
    name: deploy-api-production
    if: ${{ github.event.inputs.target == 'production' && (github.event.inputs.service == 'all' || github.event.inputs.service == 'api') }}
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: production

    steps:
      - name: Trigger Railway API production deployment
        env:
          RAILWAY_DEPLOY_HOOK_URL_API_PRODUCTION: ${{ secrets.RAILWAY_DEPLOY_HOOK_URL_API_PRODUCTION }}
        run: curl --fail --silent --show-error --location --request POST "${RAILWAY_DEPLOY_HOOK_URL_API_PRODUCTION}"

  deploy-worker-production:
    name: deploy-worker-production
    if: ${{ github.event.inputs.target == 'production' && (github.event.inputs.service == 'all' || github.event.inputs.service == 'worker') }}
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: production

    steps:
      - name: Trigger Railway worker production deployment
        env:
          RAILWAY_DEPLOY_HOOK_URL_WORKER_PRODUCTION: ${{ secrets.RAILWAY_DEPLOY_HOOK_URL_WORKER_PRODUCTION }}
        run: curl --fail --silent --show-error --location --request POST "${RAILWAY_DEPLOY_HOOK_URL_WORKER_PRODUCTION}"
